# Change the prefix key to C-a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Toggle between the current and previous window by pressing C-a twice
bind C-a last-window

# Reload the configuration file instantly
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Reduce ESC key delay for Vim
set -sg escape-time 10

# Extend message display time to 2 seconds
set -g display-time 2000

# Enable mouse support
set -g mouse on

# Set the starting index for windows and panes to 1
set -g base-index 1
setw -g pane-base-index 1

# Automatically renumber windows when one is closed
set -g renumber-windows on

# Swap window positions with Ctrl + Shift + Left/Right arrow keys
bind-key -n C-S-Left swap-window -t -1 \; previous-window
bind-key -n C-S-Right swap-window -t +1 \; next-window

# Keep the current directory when creating a new window
bind c new-window -c "#{pane_current_path}"

# Split panes and keep the current directory
# | for vertical split, - for horizontal split
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Resize panes by 5 cells using Prefix + Ctrl + arrow keys
bind -r C-Up    resize-pane -U 5
bind -r C-Down  resize-pane -D 5
bind -r C-Left  resize-pane -L 5
bind -r C-Right resize-pane -R 5

# Equalize pane sizes
bind = select-layout even-horizontal
bind + select-layout even-vertical

# Highlight the active pane border
set -g pane-active-border-style fg=green

# Use vi-style keybindings in copy mode
set -g mode-keys vi

# Align copy-mode selection keys with Vim
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Copy the selected text to the system clipboard on 'y'
# For macOS (pbcopy)
if-shell "uname | grep -q Darwin" \
  "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'"

# For WSL2 (clip.exe on Windows)
if-shell "uname -r | grep -qi microsoft" \
  "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'clip.exe'"

# For standard Linux (prefer wl-copy on Wayland, fallback to xclip on X11)
if-shell "[ \"$(uname)\" = 'Linux' ] && ! uname -r | grep -qi microsoft" \
  "if-shell 'command -v wl-copy >/dev/null 2>&1' \
    'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel \"wl-copy\"' \
    'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel \"xclip -sel clip -i\"'"

# Clear scrollback history
bind C-k clear-history

# Set the scrollback buffer limit
set -g history-limit 100000

# Enable terminal-controlled scrollback (reproduce altscreen off)
set -g terminal-overrides 'xterm*:smcup@:rmcup@'

# Enable 256-color support
set -g default-terminal "screen-256color"

# Window navigation keybindings ([ and ])
unbind [
unbind ]
bind [ previous-window
bind ] next-window

# Keybindings for closing a window or quitting the session
# Reproduce Screen's `bind K kill` and `bind \\ quit`
bind K kill-window
bind \\ confirm-before -p "kill-session? (y/n)" kill-session

# Status bar styling (reproduce Screen's theme)
set -g status-style bg=black,fg=white
set -g status-left ""
set -g status-right ""
set -g window-status-current-style bg=white,fg=black,bold
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W* "
